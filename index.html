<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AntSystem — Simulation de fourmis WebGPU</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }
    #app { width: 100%; height: 100%; }
    #overlay {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: #9a9a9a;
      font-size: 12px;
      user-select: none;
      pointer-events: none;
      line-height: 1.5;
    }
    #webgpu-error {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #ddd;
      background: #111;
      font-size: 16px;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="overlay"></div>
  <div id="webgpu-error"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
